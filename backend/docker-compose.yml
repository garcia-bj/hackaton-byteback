version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: safeguard-postgres
    environment:
      POSTGRES_USER: safeguard
      POSTGRES_PASSWORD: safeguard_password
      POSTGRES_DB: safeguard_db
    ports:
      - '5440:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
